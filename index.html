<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termómetro de Progreso</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b1a33;
      color: white;
      font-family: 'Open Sans', sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 2em;
      margin-bottom: 20px;
    }
    .thermometer {
      position: relative;
      width: 100px;
      height: 400px;
      background-color: #ccc;
      border-radius: 50px;
      margin: 0 auto;
      overflow: hidden;
    }
    .fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background-color: #00c853;
      border-radius: 50px;
      transition: height 0.5s ease;
    }
    .goal {
      margin-top: 20px;
      font-size: 1.2em;
    }
    .input-section {
      margin-top: 30px;
    }
    input {
      padding: 10px;
      font-size: 1em;
      border-radius: 5px;
      border: none;
      width: 150px;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      background-color: #ffd700;
      color: #0b1a33;
      cursor: pointer;
      margin-left: 10px;
    }
    .message {
      margin-top: 20px;
      font-style: italic;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <h1>Progreso hacia tu libertad financiera</h1>
  <div class="thermometer">
    <div class="fill" id="fill"></div>
  </div>
  <div class="goal" id="goalText">0% completado - $0 de $76,000</div>

  <div class="input-section">
    <input type="number" id="abono" placeholder="Ingresa abono ($)">
    <button onclick="registrarAbono()">Registrar Abono</button>
  </div>

  <div class="message">Cada vez que abones a capital, colorea un segmento. ¡Siente la victoria de estar más cerca de tu libertad!</div>

  <script>
    const meta = 76000;
    let totalAbonado = parseFloat(localStorage.getItem('totalAbonado')) || 0;

    function actualizarTermometro() {
      const porcentaje = Math.min((totalAbonado / meta) * 100, 100);
      document.getElementById('fill').style.height = porcentaje + '%';
      document.getElementById('goalText').textContent = `${porcentaje.toFixed(1)}% completado - $${totalAbonado.toLocaleString()} de $${meta.toLocaleString()}`;
    }

    function registrarAbono() {
      const abono = parseFloat(document.getElementById('abono').value);
      if (!isNaN(abono) && abono > 0) {
        totalAbonado += abono;
        localStorage.setItem('totalAbonado', totalAbonado);
        actualizarTermometro();
        document.getElementById('abono').value = '';
      }
    }

    actualizarTermometro();
  </script>
</body>
</html>
